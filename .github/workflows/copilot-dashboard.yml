name: Copilot Dashboard

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  weekly-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
    - uses: actions/checkout@v4

    - name: Create dashboard issue
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        WEEK_AGO=$(date -u -d "7 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d 2>/dev/null || echo "unknown")
        ISSUE_URL=$(gh issue create \
          --title "Cascade Dashboard ${DATESTAMP}" \
          --body "## Weekly Cascade Dashboard - ${DATESTAMP}

        Create a comprehensive weekly report. Save as cascade/reports/dashboard-${DATESTAMP}.md and open a PR.

        Period: ${WEEK_AGO} to ${DATESTAMP}

        Read ALL data from:
        - cascade/cauldron/ (daily shared state)
        - molequla-lab/runs/ (evolution logs)
        - haiku-lab/exchanges/ (haiku files)
        - yent-lab/logs/ (Yent commentary)
        - wtforacle-lab/logs/ (WTForacle responses)
        - arianna-lab/logs/ (Arianna reflections)
        - doe-lab/logs/ (DoE parliament verdicts)

        Include:
        1. Health grid: days x organisms (ran or not)
        2. Word count per organism per day (ASCII bar chart)
        3. Best quotes from each organism this week
        4. Cross-pollination evidence
        5. Recommendations

        Keep it under 200 lines. Dense, readable, no filler.")
        ISSUE_NUM=$(echo "$ISSUE_URL" | grep -o '[0-9]*$')
        gh api repos/ariannamethod/ariannamethod/issues/${ISSUE_NUM}/assignees -X POST -f 'assignees[]=copilot-swe-agent[bot]' > /dev/null
        echo "Created dashboard issue #${ISSUE_NUM}"

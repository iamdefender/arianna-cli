name: Molequla Lab

on:
  push:
    paths:
      - '.github/workflows/molequla-lab.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/molequla
        path: molequla-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq libomp-dev gcc

    - name: Build
      working-directory: molequla-src
      run: CGO_ENABLED=1 go build -o molequla . && ls -lh molequla

    - name: Evolve
      working-directory: molequla-src
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        RUN_DIR="../molequla-lab/runs/${DATESTAMP}"
        mkdir -p "${RUN_DIR}"
        DURATION=15
        echo "Phase 1: earth + air (parallel, 15 min each)"
        timeout $((DURATION * 60)) ./molequla --element earth --evolution > "${RUN_DIR}/earth.log" 2>&1 &
        timeout $((DURATION * 60)) ./molequla --element air --evolution > "${RUN_DIR}/air.log" 2>&1 &
        wait || true
        echo "Phase 2: water + fire (parallel, 15 min each)"
        timeout $((DURATION * 60)) ./molequla --element water --evolution > "${RUN_DIR}/water.log" 2>&1 &
        timeout $((DURATION * 60)) ./molequla --element fire --evolution > "${RUN_DIR}/fire.log" 2>&1 &
        wait || true
        echo "Done. All 4 elements evolved."

    - name: Report
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        RUN_DIR="molequla-lab/runs/${DATESTAMP}"
        echo "# Molequla Lab - ${DATESTAMP}" > "${RUN_DIR}/report.md"
        for elem in earth air water fire; do
          echo "## ${elem}" >> "${RUN_DIR}/report.md"
          if [ -f "${RUN_DIR}/${elem}.log" ]; then
            echo "Lines: $(wc -l < ${RUN_DIR}/${elem}.log)" >> "${RUN_DIR}/report.md"
            tail -10 "${RUN_DIR}/${elem}.log" >> "${RUN_DIR}/report.md"
          fi
        done

    - name: Write to cauldron
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        mkdir -p cascade/cauldron
        CAULDRON="cascade/cauldron/${DATESTAMP}.md"
        echo "# Cascade - ${DATESTAMP}" > "$CAULDRON"
        echo "" >> "$CAULDRON"
        echo "## molequla (03:00 UTC)" >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        RUN_DIR="molequla-lab/runs/${DATESTAMP}"
        for elem in earth air water fire; do
          if [ -f "${RUN_DIR}/${elem}.log" ]; then
            LINES=$(wc -l < "${RUN_DIR}/${elem}.log")
            echo "**${elem}**: ${LINES} lines" >> "$CAULDRON"
            tail -3 "${RUN_DIR}/${elem}.log" >> "$CAULDRON"
            echo "" >> "$CAULDRON"
          fi
        done

    - name: Push
      run: |
        git config user.name "Molequla Lab"
        git config user.email "lab@ariannamethod.org"
        git add molequla-lab/ cascade/ || true
        git diff --cached --quiet || git commit -m "lab: $(date -u +%Y-%m-%d)" && git push || true
